<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">

<title>大阪 建設求人</title>
<style>
:root{
  --bg:#070c11;--bg2:#0f1419;--bg3:#1a2535;--card:#0f1419;
  --border:#1e2a35;--text:#e8edf2;--text2:#8899aa;--text3:#445566;
  --accent:#E8521A;--accent2:#1ABA68;--blue:#1A6BE8;
  --grad-hire:linear-gradient(135deg,#E8521A,#ff8c42);
  --grad-seek:linear-gradient(135deg,#1A6BE8,#1ABA68);
  --shadow:0 2px 12px rgba(0,0,0,.4);--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px;min-height:100dvh;}

/* ── Header ── */
#app-header{
  background:linear-gradient(135deg,#0f1419,#1a2535);
  border-bottom:1px solid var(--border);
  padding:13px 15px 0;
  position:sticky;top:0;z-index:100;
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.header-icon{
  width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;transition:background .3s;
}
.header-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:1px;}
.header-sub{font-size:10px;color:var(--text3);}

/* ── Mode Toggle ── */
.mode-tabs{display:flex;}
.mode-tab{
  flex:1;padding:8px 0;background:transparent;border:none;
  border-bottom:2px solid var(--border);
  color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;border-radius:0;transition:all .2s;
}
.mode-tab.active-hire{background:var(--grad-hire);border-bottom:none;color:#fff;border-radius:7px 7px 0 0;}
.mode-tab.active-seek{background:var(--grad-seek);border-bottom:none;color:#fff;border-radius:7px 7px 0 0;}
.mode-tab-sub{display:block;font-size:10px;font-weight:400;opacity:.75;}

/* ── Main ── */
#app-main{max-width:600px;margin:0 auto;padding:12px 13px 60px;}

/* ── Scrollable rows ── */
.scroll-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;}
.scroll-row::-webkit-scrollbar{display:none;}

/* ── Chips ── */
.chip{
  padding:5px 11px;border-radius:15px;font-size:11px;font-weight:700;
  white-space:nowrap;cursor:pointer;flex-shrink:0;
  font-family:inherit;background:var(--bg2);color:var(--text3);
  border:1px solid var(--border);transition:all .2s;
}
.chip.active-hire{background:var(--grad-hire);color:#fff;border-color:transparent;}
.chip.active-seek{background:var(--grad-seek);color:#fff;border-color:transparent;}

/* ── Site Banners ── */
.site-banners{display:flex;gap:8px;margin-bottom:13px;}
.site-banner{
  flex:1;display:block;border-radius:10px;padding:11px 12px;
  text-decoration:none;border:1px solid rgba(255,255,255,.08);
  transition:transform .15s,opacity .15s;
}
.site-banner:active{transform:translateY(-2px);opacity:.85;}
.banner-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.banner-name{color:#fff;font-size:12px;font-weight:900;}
.banner-sub{color:rgba(255,255,255,.55);font-size:9px;}
.banner-foot{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.banner-badge{background:rgba(255,255,255,.15);font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;}
.banner-arrow{color:rgba(255,255,255,.4);font-size:10px;}

/* ── Function Tabs ── */
.func-tabs{display:flex;background:var(--bg2);border-radius:8px;padding:3px;border:1px solid var(--border);margin-bottom:13px;}
.func-tab{flex:1;padding:7px 4px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--text3);font-size:11px;font-weight:700;font-family:inherit;transition:all .2s;}
.func-tab.active-hire{background:var(--grad-hire);color:#fff;}
.func-tab.active-seek{background:var(--grad-seek);color:#fff;}

/* ── Status bar ── */
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.status-note{font-size:10px;color:var(--text3);}
.status-right{display:flex;gap:6px;align-items:center;}
.status-time{font-size:10px;color:#1e2a35;}
.refresh-btn{
  background:transparent;border:1px solid var(--border);
  padding:4px 9px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:700;font-family:inherit;transition:color .2s;
}

/* ── Loading ── */
#loading-area{display:none;text-align:center;padding:44px 20px;}
.spinner-wrap{position:relative;width:48px;height:48px;margin:0 auto 13px;}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-radius:50%;position:absolute;animation:spin .8s linear infinite;}
.spinner-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;}
.loading-msg{font-size:12px;font-weight:700;margin:0 0 4px;animation:blink 1.5s ease infinite;}
.loading-sub{font-size:10px;color:var(--text3);margin:0;}
.dots{display:flex;justify-content:center;gap:5px;margin-top:12px;}
.dot{width:5px;height:5px;border-radius:50%;animation:blink 1.2s ease infinite;}

/* ── Job Cards ── */
.job-count-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.job-count{font-size:12px;padding:2px 11px;border-radius:20px;font-weight:900;letter-spacing:1px;}
.job-count-sep{width:1px;height:11px;background:var(--border);}
.job-count-label{font-size:10px;color:var(--text3);}

.job-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;
  transition:transform .15s;animation:fadeIn .35s ease both;
}
.job-card:active{transform:translateX(4px);}
.job-card-head{display:flex;justify-content:space-between;gap:8px;}
.job-title{color:var(--text);font-size:13px;font-weight:700;line-height:1.4;flex:1;}
.job-badge{font-size:9px;padding:2px 6px;border-radius:20px;white-space:nowrap;font-weight:700;flex-shrink:0;align-self:flex-start;}
.job-detail{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;}
.job-link{font-size:10px;margin-top:7px;display:inline-block;text-decoration:none;opacity:.85;}

/* ── Error ── */
.error-box{background:#1a0a0a;border:1px solid #552222;border-radius:var(--radius);padding:16px;text-align:center;}
.error-title{color:#cc4444;font-size:13px;margin-bottom:7px;}
.error-msg{color:#665555;font-size:11px;}
.retry-btn{margin-top:10px;background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;}

/* ── Raw fallback ── */
.raw-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;}
.raw-text{color:var(--text2);font-size:12px;white-space:pre-wrap;line-height:1.7;}

/* ── Salary Graph ── */
.salary-panel{background:#0a1520;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:13px;}
.salary-title{font-size:12px;font-weight:700;margin:0 0 12px;}
.salary-row{margin-bottom:9px;transition:opacity .3s;}
.salary-row.dim{opacity:.25;}
.salary-label-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.salary-cat{font-size:11px;font-weight:700;width:90px;}
.salary-range{font-size:10px;color:var(--text2);}
.salary-bar-bg{position:relative;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.salary-bar-range{position:absolute;height:100%;}
.salary-bar-avg{position:absolute;width:2%;height:100%;border-radius:2px;}
.salary-axis{display:flex;justify-content:space-between;margin-top:5px;}
.salary-axis span{font-size:9px;color:#1e2a35;}

/* ── Skill Panel ── */
.skill-panel{background:#0a1520;border-radius:10px;padding:13px 14px;margin-bottom:13px;}
.skill-title{font-size:12px;font-weight:700;margin:0 0 10px;}
.skill-section{margin-bottom:9px;}
.skill-label{font-size:10px;color:var(--text2);display:block;margin-bottom:4px;}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;}
.tag-btn{
  padding:4px 10px;border-radius:15px;font-size:11px;cursor:pointer;
  font-family:inherit;font-weight:600;background:var(--bg2);color:var(--text3);
  border:1px solid var(--border);transition:all .15s;
}
.tag-btn.sel-hire{background:var(--accent);color:#fff;border-color:transparent;}
.tag-btn.sel-seek{background:var(--accent2);color:#fff;border-color:transparent;}
.cert-btn{
  padding:3px 9px;border-radius:15px;font-size:10px;cursor:pointer;
  font-family:inherit;font-weight:600;background:var(--bg2);color:var(--text3);
  border:1px solid var(--border);transition:all .15s;
}
.cert-btn.sel-hire{background:rgba(232,82,26,.2);color:var(--accent);border-color:var(--accent);}
.cert-btn.sel-seek{background:rgba(26,186,104,.2);color:var(--accent2);border-color:var(--accent2);}
.skill-input{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);border-radius:6px;padding:7px 10px;font-size:12px;
  font-family:inherit;outline:none;
}
.skill-input:focus{border-color:var(--text3);}
.skill-search-btn{
  width:100%;padding:9px 0;border-radius:7px;border:none;cursor:pointer;
  color:#fff;font-size:13px;font-weight:700;font-family:inherit;margin-top:11px;
}

/* ── Skill active badge ── */
.skill-badge{font-size:9px;padding:1px 7px;border-radius:10px;font-weight:700;}
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text3);padding:3px 7px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit;}

/* ── Footer ── */
.footer{margin-top:22px;padding:11px;border-top:1px solid var(--bg2);text-align:center;color:#1e2a35;font-size:10px;line-height:1.6;}

/* ── Animations ── */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
input::placeholder{color:#1e2a35;}
</style>
</head>

// ============================================================
//  Gemini呼び出し（daiku-v6と同じ方式 + useUrl対応）
// ============================================================
async function callGemini(prompt, useSearch, useUrl){
  var body = {prompt:prompt, model:'gemini-2.5-flash', useSearch:!!useSearch};
  if(useUrl) body.useUrl = true;
  var r = await fetch(FUNCTIONS_BASE+'/askClaude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){ var e=await r.json().catch(function(){return {};}); throw new Error('通信エラー: '+(e.error||r.status)); }
  var d = await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text || d.text || d.result || '応答なし';
}

// ============================================================
//  求人パーサー
// ============================================================
function parseJobs(text){
  var blocks = text.split(/\n(?=###?\s|\d+[\.\)]\s|【|\*\*[^*]+\*\*)/);
  var jobs = [], seen = new Set();
  blocks.forEach(function(block){
    var lines = block.split('\n').filter(function(l){return l.trim().length>2;});
    if(!lines.length) return;
    var title = lines[0].replace(/^[#\d\.\)【】*\s]+/,'').replace(/\*+/g,'').trim();
    if(title.length<3) return;
    var details=[], source='';
    lines.slice(1).forEach(function(line){
      var c = line.replace(/^\*+|-\s*|•\s*/,'').trim();
      if(/https?:\/\//.test(c)) source = (c.match(/https?:\/\/[^\s)）]+/)||[''])[0];
      else if(c.length>4) details.push(c);
    });
    var key = title.slice(0,20);
    if(!seen.has(key)){ seen.add(key); jobs.push({title:title,details:details,source:source}); }
  });
  return jobs.slice(0,20);
}

async function doSearch(){
  if(isLoading) return;
  isLoading = true;
  setLoadingUI(true);
  showPane('jobs');

  var isSk = (mode==='seeking');
  var queries = isSk ? curCat.sQ : curCat.hQ;
  var urls    = isSk ? curCat.sUrls : curCat.hUrls;
  var areaLabel = curArea.id==='all' ? '大阪府全域' : curArea.label;

  // クエリにエリアを反映
  var qList = queries.map(function(q,i){
    return (i+1)+'. '+q.replace('大阪', areaLabel==='大阪府全域'?'大阪':areaLabel);
  }).join('\n');

  var urlSection = '【直接参照サイト】\n'+urls.join('\n')+'\n上記URLのページを直接クロールして、実際に掲載されている求人・案件情報を収集してください。\n\n';

  var skillSection = curSkill ? '\n\n【求職者スキル】\n'+curSkill+'\nこのスキル・経験に合う求人を優先してください。' : '';

  var sys = isSk
    ? '大阪の建設業職人・一人親方向け仕事情報の専門家。Web検索と指定URLから職人が応募できる仕事・案件を最低10件以上収集する。\n各案件:\n### [タイトル]\n- 仕事内容\n- 日給・単価\n- 勤務地（市区町村）\n- 必要経験・資格\n- URL\n重複除外。架空情報厳禁。'
    : '大阪の建設業求人専門家。Web検索と指定URLから求人を最低10件以上収集する。\n各求人:\n### [タイトル]\n- 職種・内容\n- 給与\n- 勤務地（市区町村）\n- 応募資格\n- URL\n重複除外。架空情報厳禁。';

  var prompt = sys+'\n\n'+urlSection+
    '以下のキーワードでもWeb検索して追加収集してください（目標15〜20件）：\n'+qList+skillSection;

  var t1 = setTimeout(function(){setLoadingMsg('📡 プラスワーク・助太刀をクロール中…');},3000);
  var t2 = setTimeout(function(){setLoadingMsg('🗂️ 結果を整理しています…');},8000);

  try{
    // useSearch=true + useUrl=true で Google検索 & URLContext 両方ON
    var text = await callGemini(prompt, true, true);
    clearTimeout(t1); clearTimeout(t2);
    var jobs = parseJobs(text);

    document.getElementById('search-note').textContent = '🌐 Gemini + Google検索 + URLクロール取得';
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

    if(jobs.length>0){
      renderJobs(jobs);
    } else if(text.trim()){
      document.getElementById('raw-area').style.display='block';
      document.getElementById('raw-text').textContent = text;
    }
  } catch(err){
    clearTimeout(t1); clearTimeout(t2);
    document.getElementById('error-area').style.display='block';
    document.getElementById('error-msg').textContent = err.message;
  }
  isLoading = false;
  setLoadingUI(false);
}

function renderJobs(jobs){
  var isSk = (mode==='seeking');
  var colors = isSk ? SEEK_COLORS : HIRE_COLORS;
  var ac = isSk ? '#1ABA68' : '#E8521A';

  var countEl = document.getElementById('job-count');
  countEl.textContent = jobs.length+' 件ヒット';
  countEl.style.background = ac+'22';
  countEl.style.color = ac;

  document.getElementById('job-count-label').textContent =
    (isSk?'仕事・案件':'求人')+' / '+curArea.label+' / '+curCat.label;

  var list = document.getElementById('job-list');
  list.innerHTML = '';
  jobs.forEach(function(job, i){
    var accent = colors[i%12];
    var card = document.createElement('div');
    card.className = 'job-card';
    card.style.borderLeft = '3px solid '+accent;
    card.style.animationDelay = (Math.min(i,8)*0.04)+'s';

    var badge = isSk?'募集中':'NEW';
    var detailHtml = job.details.slice(0,3).map(function(d){
      return '<div class="job-detail">• '+esc(d)+'</div>';
    }).join('');
    var linkHtml = job.source
      ? '<a href="'+esc(job.source)+'" target="_blank" rel="noopener" class="job-link" style="color:'+accent+';">🔗 詳細を見る →</a>'
      : '';

    card.innerHTML =
      '<div class="job-card-head">'+
        '<div class="job-title">'+esc(job.title)+'</div>'+
        '<span class="job-badge" style="background:'+accent+'22;color:'+accent+';">'+badge+'</span>'+
      '</div>'+
      detailHtml+linkHtml;

    list.appendChild(card);
  });

  document.getElementById('results-area').style.display='block';
}

    html += '<div class="salary-row'+dim+'">'+
      '<div class="salary-label-row">'+
        '<span class="salary-cat" style="color:'+d.color+'">'+d.label+'</span>'+
        '<span class="salary-range">¥'+d.min.toLocaleString()+' 〜 <strong style="color:'+d.color+'">¥'+d.avg.toLocaleString()+'</strong> 〜 ¥'+d.max.toLocaleString()+'</span>'+
      '</div>'+

        '<div class="salary-bar-range" style="left:'+minPct+'%;width:'+(maxPct-minPct)+'%;background:'+d.color+'33;"></div>'+
        '<div class="salary-bar-avg"  style="left:'+(avgPct-1)+'%;background:'+d.color+';"></div>'+

  document.getElementById('salary-rows').innerHTML = html;

// ============================================================

function setLoadingUI(on){
  document.getElementById('loading-area').style.display = on?'block':'none';
  document.getElementById('error-area').style.display   = 'none';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('raw-area').style.display     = 'none';
  document.getElementById('refresh-btn').disabled = on;
  document.getElementById('refresh-btn').textContent = on?'検索中…':'🔄 更新';
  if(on) setLoadingMsg('🔍 '+curArea.label+'の'+curCat.label+'を検索中…');
}

function setLoadingMsg(msg){
  document.getElementById('loading-msg').textContent=msg;
}

function showPane(name){
  ['jobs','salary','skill'].forEach(function(n){
    document.getElementById('pane-'+n).style.display=(n===name)?'block':'none';
  });
  funcTab=name;
  updateAccentColors();
}

function setMode(m){
  mode=m;
  renderAll();
  doSearch();
}

function setFuncTab(name){
  showPane(name);
  if(name==='salary') renderSalary();
}

function selectArea(id){
  curArea = AREAS.find(function(a){return a.id===id;}) || AREAS[0];
  renderAll();
  doSearch();
}

function selectCat(id){
  curCat = CATS.find(function(c){return c.id===id;}) || CATS[0];
  renderAll();
  doSearch();
}

function toggleExp(v){
  selExp = selExp===v ? '' : v;
  renderSkillPanel();
}

function toggleCert(v){
  var idx=selCerts.indexOf(v);
  if(idx>=0) selCerts.splice(idx,1); else selCerts.push(v);
  renderSkillPanel();
}

function skillSearch(){
  var pref=document.getElementById('pref-input').value.trim();
  var parts=[];
  if(selExp) parts.push('経験年数: '+selExp);
  if(selCerts.length) parts.push('資格: '+selCerts.join('、'));
  if(pref) parts.push('希望: '+pref);
  curSkill = parts.length ? parts.join('\n') : null;

  var isSk=(mode==='seeking');
  var ac = isSk ? '#1ABA68' : '#E8521A';
  var badge=document.getElementById('skill-badge');
  if(curSkill){
    badge.textContent='スキル検索中';
    badge.style.background=ac+'22';
    badge.style.color=ac;
    badge.style.display='inline';
    document.getElementById('reset-btn').style.display='inline';
  }
  showPane('jobs');
  doSearch();
}

function resetSkill(){
  curSkill=null; selExp=''; selCerts=[];
  document.getElementById('pref-input').value='';
  document.getElementById('skill-badge').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  renderSkillPanel();
  doSearch();
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

});
